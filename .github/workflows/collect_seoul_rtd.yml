name: Seoul RTD Collector
on:
  workflow_dispatch:
jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4
      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: pip install aiohttp
      - name: 데이터 수집 실행
        run: python scripts/collect.py
        env:
          SEOUL_API_KEY: ${{ secrets.SEOUL_API_KEY }}
      - name: 결과 커밋 & 푸시
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git pull --rebase origin main
          git add data/
          git diff --staged --quiet || git commit -m "data: $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M') KST"
          git push
